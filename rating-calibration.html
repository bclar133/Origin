<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Origin Invincible Rating Calibration</title>
    <meta name="description" content="Tune Origin Invincible player ratings and export rating overrides." />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="rating-calibration.css" />
  </head>
  <body>
    <main class="calibration-shell">
      <header class="calibration-header">
        <div>
          <p class="eyebrow">Origin Invincible</p>
          <h1>Rating Calibration</h1>
          <p class="subtitle">Tune Origin player-season ratings. Changes save in this browser and the game applies them when it loads.</p>
        </div>
        <div class="header-actions">
          <a class="button" href="index.html">Back To Game</a>
          <button id="copyJson" class="button primary">Copy JSON</button>
          <button id="downloadCsv" class="button">Download CSV</button>
        </div>
      </header>

      <section class="controls-panel">
        <label>
          <span>Batch size</span>
          <select id="batchSize">
            <option value="30">30 players</option>
            <option value="50" selected>50 players</option>
            <option value="80">80 players</option>
          </select>
        </label>
        <label>
          <span>View</span>
          <select id="viewMode">
            <option value="batch" selected>Current spread</option>
            <option value="edited">Edited only</option>
            <option value="all">All player-seasons</option>
          </select>
        </label>
        <label>
          <span>State</span>
          <select id="stateFilter">
            <option value="all" selected>All states</option>
            <option value="QLD">QLD</option>
            <option value="NSW">NSW</option>
          </select>
        </label>
        <label>
          <span>Year</span>
          <select id="yearFilter">
            <option value="all" selected>All years</option>
          </select>
        </label>
        <label class="search-field">
          <span>Search</span>
          <input id="searchBox" type="search" placeholder="Find a player" autocomplete="off" />
        </label>
        <button id="newBatch" class="button accent">New Spread</button>
        <button id="clearOverrides" class="button danger">Clear Changes</button>
      </section>

      <section id="summary" class="summary-panel"></section>
      <section id="exportPanel" class="export-panel" hidden>
        <div class="export-header">
          <div>
            <h2 id="exportTitle">Export</h2>
            <p id="exportStatus">Export text is ready.</p>
          </div>
          <button id="selectExportText" class="button">Select Text</button>
        </div>
        <textarea id="exportText" readonly spellcheck="false"></textarea>
      </section>
      <section id="playerGrid" class="player-grid"></section>
    </main>

    <script src="origin-data.js?v=20260619084049"></script>
    <script src="rating-calibration-tool.js?v=20260619084049"></script>
  </body>
</html>
